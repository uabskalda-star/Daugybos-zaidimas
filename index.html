<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <title>Daugybos žaidimas</title>

  <style>
    body {
      margin: 0;
      background: #e0f2fe;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .box {
      width: 900px;
      padding: 72px;
      background: white;
      border-radius: 32px;
      text-align: center;
      transition: background 0.3s ease;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .question {
      font-size: 56px;
      margin: 30px 0;
    }

    input {
      width: 100%;
      font-size: 40px;
      padding: 20px;
      margin-top: 15px;
      text-align: center;
      border-radius: 12px;
      border: 2px solid #999;
    }

    button {
      width: 100%;
      font-size: 36px;
      padding: 20px;
      margin-top: 15px;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="box" id="box">
    <h1>🎮 Daugybos žaidimas</h1>

    <div class="question" id="question"></div>

    <!-- FORM leidžia naudoti ENTER -->
    <form onsubmit="check(event)">
      <input
        id="answer"
        type="number"
        placeholder="Įrašyk atsakymą"
        autofocus
      />
      <button type="submit">Tikrinti</button>
    </form>
  </div>

  <script>
    let a, b;

    function naujasPavyzdys() {
      a = Math.ceil(Math.random() * 10);
      b = Math.ceil(Math.random() * 10);

      document.getElementById("question").innerText =
        `Kiek yra ${a} × ${b}?`;

      const input = document.getElementById("answer");
      input.value = "";
      input.focus();
    }

    function check(event) {
      if (event) event.preventDefault(); // ENTER neperkrauna puslapio

      const box = document.getElementById("box");
      const value = Number(document.getElementById("answer").value);

      if (value === a * b) {
        box.style.background = "#bbf7d0"; // žalia
      } else {
        box.style.background = "#fecaca"; // raudona
      }

      setTimeout(() => {
        box.style.background = "white";
        naujasPavyzdys();
      }, 1000);
    }

    naujasPavyzdys();
  </script>

</body>
</html>
