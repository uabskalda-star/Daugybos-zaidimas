<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <title>Matematikos žaidimai</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #e0f2fe;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }
    .container {
      width: 900px;
      background: white;
      padding: 60px;
      border-radius: 30px;
      text-align: center;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 40px;
    }
    .sections {
      display: flex;
      gap: 40px;
    }
    .section {
      flex: 1;
      padding: 50px;
      border-radius: 24px;
      cursor: pointer;
      font-size: 40px;
      transition: transform 0.2s;
    }
    .section:hover {
      transform: scale(1.05);
    }
    .classic {
      background: #bbf7d0;
    }
    .fight {
      background: #fecaca;
    }
    .section small {
      display: block;
      font-size: 22px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎮 Matematikos žaidimai</h1>

  <div class="sections">
    <div class="section classic"
         onclick="location.href='klasikinis/daugyl>
    </div>

    <div class="section fight"
         onclick="location.href='kova/index.html'</div>
  </div>
</div>

</body>
</html>
